[build]
  command = "npm run build"
  publish = "dist"
  base = "/"

# Canonical host redirects
[[redirects]]
  from   = "http://zoraglobalai.com/*"
  to     = "https://www.zoraglobalai.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "https://zoraglobalai.com/*"
  to     = "https://www.zoraglobalai.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.zoraglobalai.com/*"
  to     = "https://www.zoraglobalai.com/:splat"
  status = 301
  force  = true

# Service URL canonicalization
[[redirects]]
  from   = "/services"
  to     = "/services/website-web-application-services"
  status = 301

[[redirects]]
  from   = "/services/it"
  to     = "/services/website-web-application-services"
  status = 301

[[redirects]]
